<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Demon Field Reports</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="app">

<header>

<h1>😈 Demon Field Reports</h1>

<p>What does your heart need today?</p>

</header>

<section class="card">

<h2>💚💜 Together</h2>

<button id="messageButton" class="shared">
💌 Leave Me A Note
</button>

<button id="missYouButton" class="shared">
❤️ Miss You
</button>

<button id="nightButton" class="shared">
🌙 Spend the Night
</button>

<div id="nightMenu" class="submenu">

<button class="shared nightOption">
💛 Sleep Only
</button>

<button class="shared nightOption">
❤️ Cuddles
</button>

<button class="shared nightOption">
🎬 Movie First
</button>

<button class="shared nightOption">
☕ Coffee / Tea
</button>

<button class="shared nightOption">
🔥 Open To More
</button>

<button class="shared nightOption">
🍳 Breakfast Together
</button>

</div>

<button id="planDateButton" class="shared">
📅 Plan A Date
</button>

<button id="surpriseButton" class="shared">
🎲 Surprise Me
</button>

</section>
<section class="card">

<h2>💚 Cortney</h2>

<button id="cSong" class="cortney">
🎵 Send Me A Song
</button>

<button id="cArt" class="cortney">
🎨 Show Me Your Art
</button>

<button id="cField" class="cortney">
📓 Field Report
</button>

<button id="cWork" class="cortney">
😂 Work Shenanigans
</button>

<button id="cLook" class="cortney">
📸 Show Me What You're Looking At
</button>

<button id="cThought" class="cortney">
💭 Random Thoughts
</button>

</section>

<section class="card">

<h2>💜 Brett</h2>

<button id="bSong" class="brett">
🎵 Send Me A Song
</button>

<button id="bArt" class="brett">
🎨 Show Me Your Art
</button>

<button id="bField" class="brett">
📓 Field Report
</button>

<button id="bWork" class="brett">
😂 Work Shenanigans
</button>

<button id="bLook" class="brett">
📸 Show Me What You're Looking At
</button>

<button id="bThought" class="brett">
💭 Random Thoughts
</button>

</section>
<section class="card">

<h2>📨 Activity</h2>

<p style="opacity:.8;">
Eventually this will show the latest notes, songs,
field reports, and requests from each of you.
</p>

<div id="activityFeed">

<p>No activity yet.</p>

</div>

</section>

<dialog id="popup">

<h2 id="popupTitle"></h2>

<p id="popupText"></p>

<textarea
id="popupInput"
rows="8"
placeholder="Write here..."
></textarea>

<div class="popupButtons">

<button id="sendButton" class="shared">
📤 Send
</button>

<button id="closePopup" class="brett">
Close
</button>

</div>

</dialog>
<script type="module" src="script.js"></script>

</div>

</body>

</html>
